---
layout: default
title: home
---
<style>
html { height: 100%; overflow: hidden; }
body { height: 100%; display: flex; flex-direction: column; overflow: hidden; }

/* rotating grid */
.grid {
  position: fixed; inset: -50%;
  width: 200%; height: 200%;
  background-image:
    linear-gradient(rgba(74,140,111,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,140,111,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridDrift 50s linear infinite;
  pointer-events: none;
}
@keyframes gridDrift {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

.vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 25%, var(--bg) 78%);
  pointer-events: none; z-index: 1;
}

/* orbiting rings */
.ring-wrap {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; z-index: 0;
}
.ring {
  border-radius: 50%; border: 1px solid rgba(74,140,111,0.08);
  position: absolute; animation: spinRing 60s linear infinite;
}
.ring:nth-child(1) { width: 520px; height: 520px; }
.ring:nth-child(2) { width: 380px; height: 380px; border-color: rgba(184,194,74,0.06); animation-duration: 45s; animation-direction: reverse; }
.ring:nth-child(3) { width: 700px; height: 700px; border-color: rgba(58,122,156,0.05); animation-duration: 90s; }
.ring::before {
  content: ''; position: absolute; top: -3px; left: 50%;
  width: 5px; height: 5px; border-radius: 50%; opacity: 0.7;
}
.ring:nth-child(1)::before { background: var(--accent-bright); box-shadow: 0 0 10px 2px var(--accent); }
.ring:nth-child(2)::before { background: var(--accent-2); box-shadow: 0 0 10px 2px var(--accent-2); }
.ring:nth-child(3)::before { background: var(--accent-3); box-shadow: 0 0 10px 2px var(--accent-3); }
@keyframes spinRing { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

/* scanline */
.scanline {
  position: fixed; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(74,140,111,0.3) 50%, transparent);
  animation: scan 10s cubic-bezier(0.4,0,0.6,1) infinite;
  pointer-events: none; z-index: 4;
}
@keyframes scan {
  0%   { top: -2px; opacity: 0; }
  5%   { opacity: 1; }
  95%  { opacity: 1; }
  100% { top: 100vh; opacity: 0; }
}

/* sparkles */
.sparkle-field { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
.sp {
  position: absolute; width: 2px; height: 2px;
  border-radius: 50%; opacity: 0;
  animation: sparkle var(--sd,3s) ease-in-out infinite var(--ss,0s);
}
.sp.g { background: var(--accent-bright); box-shadow: 0 -5px 0 .5px var(--accent-bright), 0 5px 0 .5px var(--accent-bright), -5px 0 0 .5px var(--accent-bright), 5px 0 0 .5px var(--accent-bright); }
.sp.y { background: var(--accent-2); box-shadow: 0 -5px 0 .5px var(--accent-2), 0 5px 0 .5px var(--accent-2), -5px 0 0 .5px var(--accent-2), 5px 0 0 .5px var(--accent-2); }
.sp.b { background: var(--accent-3); box-shadow: 0 -5px 0 .5px var(--accent-3), 0 5px 0 .5px var(--accent-3), -5px 0 0 .5px var(--accent-3), 5px 0 0 .5px var(--accent-3); }
@keyframes sparkle {
  0%   { opacity: 0; transform: scale(0.3) rotate(0deg); }
  25%  { opacity: var(--sp,.6); transform: scale(1) rotate(45deg); }
  75%  { opacity: var(--sp,.6); transform: scale(1) rotate(45deg); }
  100% { opacity: 0; transform: scale(0.3) rotate(90deg); }
}

/* stage */
.stage {
  position: relative; z-index: 5;
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 0;
}

/* DNA helix hero */
.helix-hero {
  width: 80px; height: 200px;
  margin-bottom: 40px;
  opacity: 0;
  animation: fadeUp 1.6s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
}
.helix-hero svg { width: 100%; height: 100%; overflow: visible; }

/* wordmark */
.wordmark {
  text-align: center;
  opacity: 0;
  animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 0.6s forwards;
}
.word-broken {
  display: block;
  font-family: var(--font-display);
  font-size: clamp(44px, 10vw, 88px);
  font-weight: 100;
  letter-spacing: 0.3em;
  color: var(--text);
  line-height: 1;
  opacity: 0.75;
}
.word-ladder {
  display: block;
  font-family: var(--font-display);
  font-size: clamp(44px, 10vw, 88px);
  font-weight: 100;
  letter-spacing: 0.3em;
  color: var(--accent-bright);
  line-height: 1;
}
.slash {
  display: block; width: 32px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent-2), transparent);
  margin: 14px auto; opacity: 0.5;
}

.tagline {
  margin-top: 28px;
  font-family: var(--font-mono);
  font-size: 10px; font-weight: 200;
  letter-spacing: 0.28em; text-transform: uppercase;
  color: var(--text-dim); text-align: center;
  opacity: 0;
  animation: fadeUp 1.4s cubic-bezier(0.16,1,0.3,1) 1s forwards;
}

/* corner accents */
.corner {
  position: fixed; width: 70px; height: 70px;
  pointer-events: none; z-index: 3; opacity: 0.25;
}
.corner.tl { top: 24px; left: 24px; }
.corner.tr { top: 24px; right: 24px; transform: scaleX(-1); }
.corner.bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
.corner.br { bottom: 24px; right: 24px; transform: scale(-1); }
</style>

<div class="grid"></div>
<div class="vignette"></div>
<div class="scanline"></div>

<div class="ring-wrap">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
</div>

{% for corner in "tl,tr,bl,br" | split: "," %}
<div class="corner {{ corner }}">
  <svg viewBox="0 0 70 70" fill="none" xmlns="http://www.w3.org/2000/svg">
    <line x1="0" y1="0" x2="35" y2="0" stroke="var(--accent)" stroke-width="0.8"/>
    <line x1="0" y1="0" x2="0" y2="35" stroke="var(--accent)" stroke-width="0.8"/>
    <line x1="10" y1="10" x2="22" y2="10" stroke="var(--accent)" stroke-width="0.5" opacity="0.5"/>
    <line x1="10" y1="10" x2="10" y2="22" stroke="var(--accent)" stroke-width="0.5" opacity="0.5"/>
    <circle cx="0" cy="0" r="2" fill="var(--accent)" opacity="0.7"/>
  </svg>
</div>
{% endfor %}

<div class="sparkle-field" id="sparkles"></div>

<div class="stage">
  <!-- DNA helix — interlaced strands with crossing masks and base pair rungs -->
  <div class="helix-hero">
    <svg viewBox="0 0 50 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- peaks at y=0,38,76,114(break),152,190 | crossovers at y=19,57,95,133,171 -->
      <!-- strands START at peaks — clean ladder termination top and bottom -->
      <!-- back strands -->
      <path d="M10,0 C10,10 18,14 25,19 C32,24 40,28 40,38" stroke="var(--accent-3)" stroke-width="1.8" fill="none" opacity=".4"/>
      <path d="M10,38 C10,48 18,52 25,57 C32,62 40,66 40,76" stroke="var(--accent)" stroke-width="1.8" fill="none" opacity=".4"/>
      <path d="M10,76 C10,86 18,90 25,95 C32,100 40,104 40,114" stroke="var(--accent-3)" stroke-width="1.8" fill="none" opacity=".4"/>
      <!-- crossing masks -->
      <rect x="22.5" y="16" width="5" height="6" fill="var(--bg)"/>
      <rect x="22.5" y="54" width="5" height="6" fill="var(--bg)"/>
      <rect x="22.5" y="92" width="5" height="6" fill="var(--bg)"/>
      <!-- front strands -->
      <path d="M40,0 C40,10 32,14 25,19 C18,24 10,28 10,38" stroke="var(--accent)" stroke-width="1.8" fill="none" opacity=".92"/>
      <path d="M40,38 C40,48 32,52 25,57 C18,62 10,66 10,76" stroke="var(--accent-3)" stroke-width="1.8" fill="none" opacity=".92"/>
      <path d="M40,76 C40,86 32,90 25,95 C18,100 10,104 10,114" stroke="var(--accent)" stroke-width="1.8" fill="none" opacity=".92"/>
      <!-- faded section — B broken, A continues -->
      <path d="M10,114 C10,124 18,128 25,133 C32,138 40,142 40,152 C40,162 32,166 25,171 C18,176 10,180 10,190" stroke="var(--accent)" stroke-width="1.8" fill="none" opacity=".2"/>
      <path d="M40,114 C40,124 32,128 25,133 C18,138 10,142 10,152 C10,162 18,166 25,171 C32,176 40,180 40,190" stroke="var(--accent-3)" stroke-width="1.8" fill="none" opacity=".09"/>
      <!-- rungs at peaks -->
      <line x1="10" y1="0"   x2="25"  y2="0"   stroke="var(--accent-2)" stroke-width="2.2"/>
      <line x1="25"  y1="0"   x2="40" y2="0"   stroke="var(--accent-3)" stroke-width="2.2" opacity=".7"/>
      <line x1="10" y1="38"  x2="25"  y2="38"  stroke="var(--accent-3)" stroke-width="2.2" opacity=".7"/>
      <line x1="25"  y1="38"  x2="40" y2="38"  stroke="var(--accent-2)" stroke-width="2.2"/>
      <line x1="10" y1="76"  x2="25"  y2="76"  stroke="var(--accent-2)" stroke-width="2.2"/>
      <line x1="25"  y1="76"  x2="40" y2="76"  stroke="var(--accent-3)" stroke-width="2.2" opacity=".7"/>
      <!-- y=114: break — tick only -->
      <line x1="36" y1="112" x2="44" y2="112" stroke="var(--accent-3)" stroke-width="1.2" opacity=".4"/>
      <!-- faded rungs -->
      <line x1="10" y1="152" x2="25"  y2="152" stroke="var(--accent-3)" stroke-width="2.2" opacity=".14"/>
      <line x1="25"  y1="152" x2="40" y2="152" stroke="var(--accent-2)" stroke-width="2.2" opacity=".14"/>
      <line x1="10" y1="190" x2="25"  y2="190" stroke="var(--accent-2)" stroke-width="2.2" opacity=".07"/>
      <line x1="25"  y1="190" x2="40" y2="190" stroke="var(--accent-3)" stroke-width="2.2" opacity=".07"/>
    </svg>
  </div>

  <div class="wordmark">
    <span class="word-broken">broken</span>
    <span class="slash"></span>
    <span class="word-ladder">ladder</span>
  </div>

  <p class="tagline">portland, or</p>
</div>

<script>
const field = document.getElementById('sparkles');
const types = ['g','y','b'];
const pts = [
  [10,15],[88,28],[20,70],[93,12],[6,82],[76,52],[42,7],[65,92],
  [30,40],[72,22],[15,88],[96,68],[50,48],[4,33],[90,44],[38,75],
  [24,13],[78,83],[56,28],[14,58],[92,18],[34,94],[58,9],[82,72],
  [47,38],[21,76],[66,16],[36,56],[84,36],[8,46]
];
pts.forEach(([l,t],i)=>{
  const s = document.createElement('div');
  s.className = `sp ${types[i%3]}`;
  s.style.cssText = `left:${l}%;top:${t}%;--sd:${2.5+Math.random()*5}s;--ss:${Math.random()*9}s;--sp:${0.25+Math.random()*0.5}`;
  field.appendChild(s);
});
</script>
