---
layout: default
title: songs
---
<style>
.music-page {
  max-width: 640px; margin: 0 auto;
  padding: 140px 40px 100px;
  position: relative; z-index: 1;
}
.page-label {
  font-family: var(--font-mono);
  font-size: 9px; letter-spacing: 0.28em;
  color: var(--text-dim);
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 1s ease 0.2s forwards;
}
.track-list { display: flex; flex-direction: column; gap: 2px; }
.track {
  display: flex; align-items: baseline;
  gap: 20px; padding: 20px 0;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  text-decoration: none; color: inherit;
  opacity: 0;
  animation: fadeUp 1s ease var(--d,0.4s) forwards;
  transition: background 0.2s;
}
.track:hover .track-title { color: var(--accent-bright); }
.track-info { flex: 1; }
.track-title {
  font-family: var(--font-display);
  font-size: 22px; font-weight: 200;
  letter-spacing: 0.12em;
  color: var(--text); transition: color 0.2s;
}
.track-meta {
  margin-top: 4px;
  font-family: var(--font-mono);
  font-size: 9px; font-weight: 200;
  letter-spacing: 0.18em;
  color: var(--text-dim);
}
.track-arrow {
  font-size: 12px; color: var(--accent); opacity: 0.4;
  transition: opacity 0.2s, transform 0.2s;
}
.track:hover .track-arrow { opacity: 1; transform: translateX(4px); }
</style>

<div class="music-page">
  <p class="page-label">songs</p>
  <div class="track-list">
    <a class="track" href="/songs/flower-fields" style="--d:0.4s">
      <div class="track-info">
        <div class="track-title">flower fields</div>
        <div class="track-meta">E mixolydian</div>
      </div>
      <span class="track-arrow">→</span>
    </a>
    <a class="track" href="/songs/remeeting" style="--d:0.5s">
      <div class="track-info">
        <div class="track-title">remeeting</div>
        <div class="track-meta">B aeolian / B dorian</div>
      </div>
      <span class="track-arrow">→</span>
    </a>
    <a class="track" href="/songs/tiggeroo" style="--d:0.6s">
      <div class="track-info">
        <div class="track-title">tiggeroo</div>
        <div class="track-meta">C# open</div>
      </div>
      <span class="track-arrow">→</span>
    </a>
  </div>
</div>
