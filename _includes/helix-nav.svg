<svg viewBox="0 0 22 44" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- peaks at y=0,16,32 | crossovers at y=8,24 -->
  <!-- back strands -->
  <path d="M4,0 C4,5 8,7 11,8 C14,9 18,11 18,16"
        stroke="var(--accent-3)" stroke-width="1.4" fill="none" opacity=".4"/>
  <path d="M4,16 C4,21 8,23 11,24 C14,25 18,27 18,32"
        stroke="var(--accent)" stroke-width="1.4" fill="none" opacity=".4"/>
  <!-- crossing masks -->
  <rect x="9" y="5" width="4" height="6" fill="var(--bg)"/>
  <rect x="9" y="21" width="4" height="6" fill="var(--bg)"/>
  <!-- front strands -->
  <path d="M18,0 C18,5 14,7 11,8 C8,9 4,11 4,16"
        stroke="var(--accent)" stroke-width="1.4" fill="none" opacity=".92"/>
  <path d="M18,16 C18,21 14,23 11,24 C8,25 4,27 4,32"
        stroke="var(--accent-3)" stroke-width="1.4" fill="none" opacity=".92"/>
  <!-- faded break section -->
  <path d="M4,32 C4,37 8,39 11,40 C14,41 18,43 18,44"
        stroke="var(--accent)" stroke-width="1.4" fill="none" opacity=".18"/>
  <!-- rungs -->
  <line x1="4" y1="0"  x2="11" y2="0"  stroke="var(--accent-2)" stroke-width="1.5"/>
  <line x1="11" y1="0"  x2="18" y2="0"  stroke="var(--accent-3)" stroke-width="1.5" opacity=".6"/>
  <line x1="4" y1="16" x2="11" y2="16" stroke="var(--accent-3)" stroke-width="1.5" opacity=".6"/>
  <line x1="11" y1="16" x2="18" y2="16" stroke="var(--accent-2)" stroke-width="1.5"/>
  <line x1="4" y1="32" x2="11" y2="32" stroke="var(--accent-2)" stroke-width="1.5" opacity=".35"/>
  <line x1="11" y1="32" x2="18" y2="32" stroke="var(--accent-3)" stroke-width="1.5" opacity=".35"/>
</svg>
