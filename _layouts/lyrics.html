---
layout: default
---
<style>
/* ── shared song page styles ── */
:root { --line: rgba(106,173,165,0.18); }
.page { position:relative; z-index:1; max-width:560px; margin:0 auto; padding:120px 40px 120px; }
.header { margin-bottom:80px; opacity:0; animation:fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.2s forwards; }
.title { font-family:var(--font-body); font-size:clamp(52px,10vw,84px); font-weight:300; font-style:italic; letter-spacing:-0.02em; line-height:0.9; color:var(--text); }
.title-accent { display:block; color:var(--accent); font-weight:600; font-style:normal; }
.meta { margin-top:20px; font-family:var(--font-mono); font-size:11px; font-weight:300; letter-spacing:0.18em; color:var(--text-dim); display:flex; gap:20px; }
.meta-divider { color:var(--accent-dim); }
.rule { width:40px; height:1px; background:var(--accent); margin:32px 0; opacity:0.6; }
.lyrics { display:flex; flex-direction:column; gap:52px; }
.section { opacity:0; transform:translateY(12px); animation:fadeUp 1s cubic-bezier(0.16,1,0.3,1) var(--anim-delay,0.6s) forwards; }
.section-label { font-family:var(--font-mono); font-size:9px; letter-spacing:0.22em; color:var(--accent); opacity:0.7; margin-bottom:16px; }
.verse { font-family:var(--font-body); font-size:clamp(16px,2.6vw,19px); font-weight:300; line-height:1.85; color:var(--text); }
.verse .line { display:block; }
.chorus .verse { font-style:italic; padding-left:20px; border-left:1px solid var(--line); }
.chorus-break { height:24px; }
.bridge .verse { font-size:clamp(15px,2.4vw,17px); color:var(--text-dim); }
.outro .verse { font-size:clamp(17px,2.8vw,21px); }
em { font-style:normal; color:var(--accent); }
/* ── stars ── */
.stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
.star { position:absolute; background:var(--text); border-radius:50%; animation:twinkle var(--d,4s) ease-in-out infinite var(--delay,0s); opacity:0; }
@keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--peak,.4)} }
</style>
<div class="stars" id="lyric-stars"></div>
<script>
(()=>{
  const c=document.getElementById('lyric-stars');
  for(let i=0;i<90;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()<.85?1:Math.random()<.7?1.5:2;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*6}s;--delay:${Math.random()*8}s;--peak:${.1+Math.random()*.4}`;
    c.appendChild(s);
  }
})();
</script>

{{ content }}
