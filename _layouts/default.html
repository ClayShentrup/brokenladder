<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
<meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta name="keywords" content="Clay Shentrup, Clay Schöntrup, Clay Schontrup, broken ladder, Portland musician, indie rock, alt-rock">
<meta name="author" content="Clay Shentrup">
<meta property="og:title" content="{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}">
<meta property="og:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:type" content="{% if page.og_type %}{{ page.og_type }}{% else %}website{% endif %}">
<meta property="og:url" content="{{ site.url }}{{ page.url }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}">
<meta name="twitter:description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100;0,200;0,300;0,600;1,100;1,200&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inconsolata:wght@200;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ '/assets/theme.css' | relative_url }}">
{% if page.accent or page.bg or page.text %}
<style>
  :root {
    {% if page.accent %}--accent: {{ page.accent }};{% endif %}
    {% if page.accent_dim %}--accent-dim: {{ page.accent_dim }};{% endif %}
    {% if page.accent_bright %}--accent-bright: {{ page.accent_bright }};{% endif %}
    {% if page.accent_2 %}--accent-2: {{ page.accent_2 }};{% endif %}
    {% if page.bg %}--bg: {{ page.bg }};{% endif %}
    {% if page.text %}--text: {{ page.text }};{% endif %}
    {% if page.text_dim %}--text-dim: {{ page.text_dim }};{% endif %}
  }
</style>
{% endif %}
</head>
<body>

<nav class="site-nav">
  <a class="nav-logo" href="{{ '/' | relative_url }}">
    <span class="nav-logo-mark">{% include helix-nav.svg %}</span>
    <span class="nav-wordmark">broken ladder</span>
  </a>
  <ul class="nav-links">
    <li><a href="{{ '/songs/' | relative_url }}">songs</a></li>
    <li><a href="{{ '/about/' | relative_url }}">about</a></li>
  </ul>
</nav>

<main style="flex:1;display:flex;flex-direction:column">{{ content }}</main>

<footer class="site-footer">
  <span class="footer-copy">© 2026 broken ladder</span>
  <span class="footer-copy">portland, or</span>
</footer>

</body>
</html>
